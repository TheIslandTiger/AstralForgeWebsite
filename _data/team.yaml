- name: Tommy Doherty
  job: 3D Environment Artist, Designer
  role: Tommy is the 3D artist for Astral Forge. His world is what you experience and explore in our games and each small set dressing is his expert creation.
  why_make_games: "I have always been fascinated by the large open world games that use the environment to tell a story. I want to make games so that I can create those kind of worlds. A game world that feels alive." 
  fav_game: Mordhau
  linkedin: https://www.linkedin.com/in/tommy-doherty-72543632b/
  image: /images/team/Tommy.jpg

- name: Joseph Jefferies
  job: Animator, Technical Designer
  role: Joe is our technical animator. He works on the interactions and movement for our characters and makes the world feel alive. 
  why_make_games: "I love the technical side of games, figuring out how a game can be put together to provide an experience that can be unique to each player that plays it. I want to be able to provide that same feeling to others after experiencing it so many times myself." 
  fav_game: Hearts of Iron IV
  linkedin: https://www.linkedin.com/in/josephj2004/
