- name: Abbygale Dunn
  job: Director, Programmer, Designer
  role: As the founder and director of Astral Forge, Abbygale focuses on building the company and business whilst also being a programmer and designer on our games. 
  why_make_games: "When I was a child I felt most at home and like myself when I was playing video games and I want to give that experience to the world. That is what Astral Forge is about." 
  fav_game: "The Witcher: Enhanced Edition"
