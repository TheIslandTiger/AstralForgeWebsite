- name: Mary-Jane Law
  job: Programmer, Game Designer
  role: Mary-Jane is a designer and programmer for Astral Forge, she creates the games as you know it. The world and feel of the game is due to her imagination and talent. 
  why_make_games: "I'm driven by my passion for storytelling and exploring the psychology behind it. I want to make people connect with my projects on a deeper level." 
  fav_game: Darkest Dungeon II 
